name: Canvas (browser)

# Live canvas/WebGL bridge suite (Track 1/3): drives the REAL canvas-adapters
# bridge against real Pixi/Konva/Fabric/Phaser/Three/Babylon scene graphs inside
# Playwright WebKit (≈ WKWebView). Browser-only — no Xcode needed — so it runs on
# a cheap ubuntu runner, separate from the macOS unit/sim CI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  canvas-webkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install WebKit (Playwright)
        run: npx playwright install --with-deps webkit

      - name: Live canvas bridge tests (WebKit)
        run: npm run test:canvas
