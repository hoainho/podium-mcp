<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="c" width="800" height="600"></canvas>
    <script>
      // fabric is injected by the harness (UMD) before this runs. Build a scene
      // with a known "close" button and expose the canvas on window so the bridge
      // can find it. Ground truth: the close button's center in canvas-local CSS
      // px is (760, 30) — a fixed placement independent of devicePixelRatio.
      window.__setup = function () {
        var c = new fabric.Canvas("c");
        var close = new fabric.Rect({ left: 740, top: 10, width: 40, height: 40, fill: "red" });
        close.name = "closeBtn";
        c.add(close);
        c.renderAll();
        window.canvas = c;
        window.__expectedClose = { x: 760, y: 30 };
      };
    </script>
  </body>
</html>
